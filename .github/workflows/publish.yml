# Publish kx402 to npm via OIDC Trusted Publishing — no token, no OTP.
#
# ONE-TIME SETUP (on npmjs.com, after this file is on the default branch):
#   npm package "kx402" -> Settings -> Publishing access -> Trusted Publisher ->
#   GitHub Actions -> repository: Kali123411/kx402, workflow: publish.yml
#
# RELEASE FLOW:
#   1. bump "version" in package.json, commit
#   2. git tag vX.Y.Z && git push origin vX.Y.Z
#   The tag push runs this workflow, which verifies the tag matches package.json
#   and publishes with provenance. (workflow_dispatch also allowed for manual runs.)
name: publish

on:
  push:
    tags: ["v*.*.*"]
  workflow_dispatch:

permissions:
  contents: read
  id-token: write # required for npm OIDC trusted publishing + provenance

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          registry-url: "https://registry.npmjs.org"
      - name: Use an OIDC-capable npm
        run: npm install -g npm@latest
      - name: Verify tag matches package.json version
        if: startsWith(github.ref, 'refs/tags/')
        run: |
          PKG=$(node -p "require('./package.json').version")
          TAG="${GITHUB_REF_NAME#v}"
          test "$PKG" = "$TAG" || { echo "::error::tag $TAG does not match package.json version $PKG"; exit 1; }
      - name: Publish (OIDC — no NODE_AUTH_TOKEN needed)
        run: npm publish --provenance --access public
